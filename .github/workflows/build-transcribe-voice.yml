name: Build transcribe-voice image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push transcribe-voice image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.transcribe-voice
          push: true
          tags: bobfahey6709/whisper-server:transcribe-voice
