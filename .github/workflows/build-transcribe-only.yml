name: Build transcribe-only image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: bobfahey6709
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push transcribe-only
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.transcribe-only
          push: true
          tags: bobfahey6709/whisper-server:transcribe-only
          cache-from: type=gha
          cache-to: type=gha,mode=max
